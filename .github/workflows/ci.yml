name: CI - Validate PR in Test Environment

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main
      - "feat/**"
      - "chore/**"
      - "fix/**"

permissions:
  contents: read
  deployments: write
  pull-requests: write

jobs:
  # ============================================
  # Validate: Build and test the change
  # ============================================
  validate:
    name: Validate Change
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Type check
        run: npm run type-check --if-present

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test --if-present

  # ============================================
  # Test Deploy: Deploy PR to test environment
  # Ephemeral per-PR, isolated validation
  # ============================================
  deploy-test:
    name: Deploy to Test (PR Environment)
    runs-on: ubuntu-latest
    needs: validate
    environment:
      name: test-pr-${{ github.event.pull_request.number }}
      url: https://test-pr-${{ github.event.pull_request.number }}.example.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create test deployment
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const branchName = context.payload.pull_request.head.ref;
            const commitSha = context.payload.pull_request.head.sha;
            
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: branchName,
              environment: `test-pr-${prNumber}`,
              description: `PR #${prNumber}: Validating ${branchName} in test environment`,
              required_contexts: [],
              auto_merge: false,
              transient_environment: true
            });
            
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'success',
              description: `PR #${prNumber} validated in test environment`,
              environment_url: `https://test-pr-${prNumber}.example.com`
            });
            
            console.log(`✓ Deployed PR #${prNumber} to test for validation`);

  # ============================================
  # Cleanup: Remove test deployment on PR close
  # ============================================
  cleanup-test:
    name: Cleanup Test Environment
    runs-on: ubuntu-latest
    if: github.event.action == 'closed'
    steps:
      - name: Cleanup
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            console.log(`✓ Cleaned up test environment for PR #${prNumber}`);
