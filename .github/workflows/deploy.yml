name: Deploy to Environments

on:
  push:
    branches:
      - 'feat/automation'
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate semantic version
        id: version
        run: |
          # Get the latest tag or start from v0.0.0
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $LATEST_TAG"
          
          # Parse version parts
          MAJOR=$(echo $LATEST_TAG | cut -d. -f1 | sed 's/v//')
          MINOR=$(echo $LATEST_TAG | cut -d. -f2)
          PATCH=$(echo $LATEST_TAG | cut -d. -f3)
          
          # Increment patch version
          PATCH=$((PATCH + 1))
          NEW_TAG="v$MAJOR.$MINOR.$PATCH"
          
          echo "Generated new tag: $NEW_TAG"
          echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT

  deploy:
    needs: version
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [test, dev, qat, prod]
    environment:
      name: ${{ matrix.environment }}
    permissions:
      deployments: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create deployment for ${{ matrix.environment }}
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ needs.version.outputs.tag }}';
            
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: tag,
              environment: '${{ matrix.environment }}',
              description: 'Deploying version ' + tag + ' to ${{ matrix.environment }}',
              required_contexts: [],
              auto_merge: false
            });
            
            console.log('Created deployment:', deployment.data);

      - name: Update deployment status to success
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ needs.version.outputs.tag }}';
            
            const deployments = await github.rest.repos.listDeployments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              environment: '${{ matrix.environment }}',
              ref: tag,
              per_page: 1
            });
            
            if (deployments.data.length > 0) {
              const deployment = deployments.data[0];
              
              await github.rest.repos.createDeploymentStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                deployment_id: deployment.id,
                state: 'success',
                description: 'Successfully deployed to ${{ matrix.environment }}',
                environment_url: 'https://monitor-webapp-${{ matrix.environment }}.example.com'
              });
              
              console.log('Updated deployment status to success');
            }

      - name: Simulate deployment
        run: |
          echo "Deploying version ${{ needs.version.outputs.tag }} to ${{ matrix.environment }} environment"
          sleep 2
          echo "✓ Deployment complete"
