name: Rollback - Revert to Previous Version

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to rollback to (e.g., v1.0.0)'
        required: true
        type: string
      environment:
        description: 'Environment to rollback'
        required: true
        type: choice
        options:
          - test
          - dev
          - qat
          - prod

permissions:
  contents: read
  deployments: write

jobs:
  # ============================================
  # Rollback: Deploy previous version tag
  # Only requires selecting version and environment
  # ============================================
  rollback:
    name: Rollback to ${{ github.event.inputs.version }}
    runs-on: ubuntu-latest
    permissions:
      deployments: write
    environment:
      name: ${{ github.event.inputs.environment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.version }}

      - name: Create rollback deployment
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ github.event.inputs.version }}';
            const env = '${{ github.event.inputs.environment }}';
            
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: version,
              environment: env,
              description: `🔄 ROLLBACK: Reverting ${env} to ${version}`,
              required_contexts: [],
              auto_merge: false
            });
            
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'in_progress',
              description: `Rolling back ${env} to ${version}...`
            });
            
            // Simulate rollback
            await new Promise(resolve => setTimeout(resolve, 3000));
            
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'success',
              description: `✓ Rolled back ${env} to ${version}`
            });
            
            console.log(`✓ ROLLBACK COMPLETE: ${env} → ${version}`);

      - name: Create rollback issue
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ github.event.inputs.version }}';
            const env = '${{ github.event.inputs.environment }}';
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔄 ROLLBACK: ${env} reverted to ${version}`,
              body: `**Rollback Details**\n\n- **Environment**: ${env}\n- **Rolled back to**: ${version}\n- **Triggered by**: @${context.actor}\n- **Timestamp**: ${new Date().toISOString()}\n\nThis action was performed manually via the rollback workflow.`,
              labels: ['rollback', env]
            });
