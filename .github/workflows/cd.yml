name: CD - Promote Release by Version

on:
  push:
    branches:
      - main
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: read
  deployments: write

jobs:
  # ============================================
  # Version: Create semantic version tag on main
  # ============================================
  version:
    name: Create Semantic Version
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate semantic version
        id: version
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          
          MAJOR=$(echo $LATEST_TAG | cut -d. -f1 | sed 's/v//')
          MINOR=$(echo $LATEST_TAG | cut -d. -f2)
          PATCH=$(echo $LATEST_TAG | cut -d. -f3)
          
          PATCH=$((PATCH + 1))
          NEW_TAG="v$MAJOR.$MINOR.$PATCH"
          
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag $NEW_TAG -m "Release $NEW_TAG"
          git push origin $NEW_TAG
          
          echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "✓ Created version tag: $NEW_TAG"

  # ============================================
  # Deploy: Dev (automatic on tag)
  # First environment after main
  # ============================================
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: version
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      deployments: write
    environment:
      name: dev
      url: https://dev.example.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create dev deployment
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: tag,
              environment: 'dev',
              description: `Deploying ${tag} to dev`,
              required_contexts: [],
              auto_merge: false
            });
            
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'in_progress'
            });
            
            // Simulate deployment
            await new Promise(resolve => setTimeout(resolve, 2000));
            
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'success',
              description: 'Dev deployment successful',
              environment_url: 'https://dev.example.com'
            });
            
            console.log(`✓ Deployed ${tag} to dev`);

  # ============================================
  # Promote: QAT (manual approval required)
  # First validation before production path
  # ============================================
  deploy-qat:
    name: Deploy to QAT
    runs-on: ubuntu-latest
    needs: deploy-dev
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      deployments: write
    environment:
      name: qat
      url: https://qat.example.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create QAT deployment
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: tag,
              environment: 'qat',
              description: `Promoting ${tag} to QAT`,
              required_contexts: [],
              auto_merge: false
            });
            
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'in_progress'
            });
            
            // Simulate deployment
            await new Promise(resolve => setTimeout(resolve, 2000));
            
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'success',
              description: 'QAT deployment successful',
              environment_url: 'https://qat.example.com'
            });
            
            console.log(`✓ Promoted ${tag} to QAT`);

  # ============================================
  # Deploy: Production (manual approval)
  # Final gate before production
  # ============================================
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-qat
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      deployments: write
    environment:
      name: prod
      url: https://example.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create production deployment
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: tag,
              environment: 'prod',
              description: `Deploying ${tag} to production`,
              required_contexts: [],
              auto_merge: false
            });
            
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'in_progress'
            });
            
            // Simulate deployment
            await new Promise(resolve => setTimeout(resolve, 2000));
            
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'success',
              description: 'Production deployment successful',
              environment_url: 'https://example.com'
            });
            
            console.log(`✓ Deployed ${tag} to production`);
